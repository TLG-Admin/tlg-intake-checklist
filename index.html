<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TLG Client Intake Checklist</title><style>:root{--tlg-bg:#0b0e16;--tlg-bg2:#101524;--tlg-card:#151b2e;--tlg-card2:#1b2238;--tlg-border:#26304a;--tlg-text:#e8edf7;--tlg-muted:#94a3c4;--tlg-cyan:#22d3ee;--tlg-blue:#3b82f6;--tlg-indigo:#6366f1;--tlg-grad:linear-gradient(100deg,#22d3ee 0%,#3b82f6 50%,#6366f1 100%)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 600px at 80% -10%,rgba(34,211,238,.10),transparent 60%),radial-gradient(900px 500px at 0% 110%,rgba(99,102,241,.12),transparent 55%),var(--tlg-bg);color:var(--tlg-text);min-height:100vh;line-height:1.5;padding:28px 16px 56px}.wrap{max-width:1080px;margin:0 auto}.brandbar{height:5px;width:100%;border-radius:99px;background:var(--tlg-grad);margin-bottom:24px;box-shadow:0 0 24px rgba(59,130,246,.45)}header.hero{display:flex;align-items:center;gap:16px;margin-bottom:8px}.logo{width:46px;height:46px;border-radius:12px;background:var(--tlg-grad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;letter-spacing:.5px;color:#05080f;box-shadow:0 6px 22px rgba(34,211,238,.35)}h1{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.5px;background:var(--tlg-grad);-webkit-background-clip:text;background-clip:text;color:transparent}.sub{color:var(--tlg-muted);font-size:14px;margin:2px 0 26px;font-weight:500}.panel{background:linear-gradient(180deg,var(--tlg-card),var(--tlg-bg2));border:1px solid var(--tlg-border);border-radius:16px;padding:18px 18px 6px;margin-bottom:24px}.progwrap{display:flex;align-items:center;gap:14px;margin-bottom:14px}.progtrack{flex:1;height:12px;background:#0c111d;border:1px solid var(--tlg-border);border-radius:99px;overflow:hidden}.progfill{height:100%;width:0;background:var(--tlg-grad);border-radius:99px;transition:width .4s ease}.progpct{font-weight:800;font-size:15px;min-width:46px;text-align:right;color:var(--tlg-cyan)}.controls{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:12px}button.ctl{background:var(--tlg-card2);color:var(--tlg-text);border:1px solid var(--tlg-border);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}button.ctl:hover{border-color:var(--tlg-blue);color:#fff;box-shadow:0 0 0 1px var(--tlg-blue)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}.card{perspective:1600px;min-height:210px}.inner{position:relative;width:100%;height:100%;min-height:210px;transition:transform .55s;transform-style:preserve-3d;cursor:pointer}.card.open .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--tlg-border);padding:18px;display:flex;flex-direction:column;background:linear-gradient(160deg,var(--tlg-card2),var(--tlg-card))}.front{justify-content:space-between}.front:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:16px 0 0 16px;background:var(--tlg-grad)}.stagenum{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--tlg-cyan)}.stagetitle{font-size:18px;font-weight:700;margin:8px 0;line-height:1.25}.stagemeta{font-size:13px;color:var(--tlg-muted);font-weight:600}.flip-hint{font-size:12px;color:var(--tlg-muted);margin-top:10px}.back{transform:rotateY(180deg);overflow-y:auto}.back h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--tlg-cyan);line-height:1.3}.item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04)}.item:last-of-type{border-bottom:none}.item input{appearance:none;-webkit-appearance:none;width:18px;height:18px;min-width:18px;margin-top:1px;border:2px solid var(--tlg-border);border-radius:5px;cursor:pointer;position:relative;transition:.15s}.item input:checked{background:var(--tlg-grad);border-color:transparent}.item input:checked:after{content:'';position:absolute;left:5px;top:1px;width:4px;height:9px;border:solid #05080f;border-width:0 2px 2px 0;transform:rotate(45deg)}.item label{cursor:pointer;color:var(--tlg-text)}.item input:checked + label{color:var(--tlg-muted);text-decoration:line-through}.backmeta{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding-top:10px;font-size:12px;color:var(--tlg-muted)}.backmeta b{color:var(--tlg-cyan)}.card.done .stagemeta{color:var(--tlg-cyan)}footer{text-align:center;color:var(--tlg-muted);font-size:12px;margin-top:30px}footer .dot{color:var(--tlg-blue)}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="brandbar"></div><header class="hero"><div class="logo">TLG</div><h1>Client Intake Checklist</h1></header><div class="sub">The Love Group &mdash; AWS Cloud Partner &amp; Federal Readiness &bull; 9 stages</div><div class="panel"><div class="progwrap"><div class="progtrack"><div class="progfill" id="pf"></div></div><div class="progpct" id="pp">0%</div></div><div class="controls"><button class="ctl" id="openAll">Flip all open</button><button class="ctl" id="closeAll">Flip all closed</button><button class="ctl" id="resetAll">Reset progress</button></div></div><div class="grid" id="grid"></div><footer>&copy; <span id="yr"></span> The Love Group, LLC <span class="dot">&bull;</span> Strategy &bull; Execution &bull; Results <span class="dot">&bull;</span> Progress is saved locally in your browser.</footer></div><script>var STAGES=[{t:"Entity & Foundation",i:["Form legal entity (LLC/Corp)","Obtain EIN","Establish registered agent","Business licenses","NAICS code selection","Open business bank account","Capability statement created"]},{t:"Government Registration",i:["Get DUNS/UEI number","Register in SAM.gov","CAGE code assigned","Complete reps & certifications","Register in beta.SAM/contract opportunity portals","State/local vendor registration"]},{t:"Certifications & Set-Asides",i:["SBA small business profile","8(a) certification (if eligible)","HUBZone","SDVOSB/VOSB","WOSB/EDWOSB","State minority/DBE certs","GSA Schedule consideration"]},{t:"AWS Partner Enrollment",i:["Create AWS Partner Central account","Join AWS Partner Network (APN)","Complete Partner Path selection (Services/Software)","Foundational tier requirements","AWS account & Organizations setup","Partner Scorecard baseline"]},{t:"AWS Competency & Readiness",i:["AWS certifications for staff (Cloud Practitioner/Solutions Architect)","Complete Foundational Technical Review (FTR)","Solution/offering defined","Validated technical capability","Well-Architected training","Public sector partner program (if gov)"]},{t:"AWS Marketplace & Co-Sell",i:["Seller registration & tax/banking in Marketplace Management Portal","List offering on AWS Marketplace","Marketplace metering/contracts configured","Set up private offers","Co-sell readiness","Register deals in ACE (AWS Customer Engagements)"]},{t:"Pipeline & Capture",i:["Identify target agencies/buyers","Build pipeline of opportunities","Respond to RFIs/Sources Sought","Bid/no-bid decisions","Teaming agreements/subcontracts","Proposal development"]},{t:"Contract Award & Delivery",i:["Win first contract/task order","SOW/PWS finalized","Compliance (FedRAMP/FISMA/CMMC as needed)","Kickoff & onboarding","Deliver services on AWS"]},{t:"Revenue & Growth",i:["First invoice/revenue recognized","AWS Marketplace revenue flowing","Recurring/ARR established","Expand contract vehicles (GSA, GWACs)","Past performance documented (CPARS)","Scale AWS competencies/tiers"]}];var KEY='tlg-intake-v4';function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}function save(s){localStorage.setItem(KEY,JSON.stringify(s))}var state=load();var grid=document.getElementById('grid');function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}STAGES.forEach(function(st,si){var card=document.createElement('div');card.className='card';var items=st.i.map(function(it,ii){var id='c'+si+'_'+ii;var ck=state[id]?'checked':'';return '<div class="item"><input type="checkbox" id="'+id+'" data-id="'+id+'" aria-label="'+esc(it)+'" '+ck+'><label for="'+id+'">'+esc(it)+'</label></div>'}).join('');card.innerHTML='<div class="inner"><div class="face front"><div><div class="stagenum">STAGE '+(si+1)+'</div><div class="stagetitle">'+esc(st.t)+'</div></div><div><div class="stagemeta" data-meta="'+si+'">0 / '+st.i.length+' complete</div><div class="flip-hint">Tap to open &rarr;</div></div></div><div class="face back"><h3>Stage '+(si+1)+': '+esc(st.t)+'</h3>'+items+'<div class="backmeta"><span data-bmeta="'+si+'"><b>0</b> / '+st.i.length+'</span><span>&larr; Tap to close</span></div></div></div>';grid.appendChild(card)});function update(){var total=0,done=0;STAGES.forEach(function(st,si){var sd=0;st.i.forEach(function(it,ii){total++;if(state['c'+si+'_'+ii]){done++;sd++}});var card=grid.children[si];card.querySelector('[data-meta="'+si+'"]').textContent=sd+' / '+st.i.length+' complete';card.querySelector('[data-bmeta="'+si+'"]').innerHTML='<b>'+sd+'</b> / '+st.i.length;card.classList.toggle('done',sd===st.i.length)});var pct=total?Math.round(done/total*100):0;document.getElementById('pf').style.width=pct+'%';document.getElementById('pp').textContent=pct+'%'}grid.addEventListener('click',function(e){if(e.target.matches('input[type=checkbox]'))return;var card=e.target.closest('.card');if(card)card.classList.toggle('open')});grid.addEventListener('change',function(e){if(e.target.matches('input[type=checkbox]')){var id=e.target.dataset.id;if(e.target.checked)state[id]=1;else delete state[id];save(state);update()}});document.getElementById('openAll').onclick=function(){[].forEach.call(grid.children,function(c){c.classList.add('open')})};document.getElementById('closeAll').onclick=function(){[].forEach.call(grid.children,function(c){c.classList.remove('open')})};document.getElementById('resetAll').onclick=function(){if(confirm('Reset all checklist progress?')){state={};save(state);[].forEach.call(grid.querySelectorAll('input[type=checkbox]'),function(c){c.checked=false});update()}};document.getElementById('yr').textContent=new Date().getFullYear();update();</script></body></html>
