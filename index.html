<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TLG Client Intake Checklist</title>
<style>
  :root{--tlg-dark:#0b0b0d;--tlg-purple:#7b4dff;--tlg-cyan:#22d3ee;--tlg-gold:#d4a437;--ink:#1a1a1f;--line:#e6e6ea;--muted:#6b7280}
  *{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:#fff}
  .tlg-header{background:var(--tlg-dark);padding:18px 24px;display:flex;align-items:center;gap:14px}
  .tlg-header .brand{font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,var(--tlg-cyan),var(--tlg-purple),var(--tlg-gold));-webkit-background-clip:text;background-clip:text;color:transparent;font-size:22px}
  .tlg-header .tag{color:#9ca3af;font-size:11px;letter-spacing:3px;text-transform:uppercase}
  .wrap{max-width:920px;margin:0 auto;padding:24px}
  h1{font-size:22px;margin:0 0 16px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  select,input[type=search]{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .stage{margin:20px 0 8px;font-weight:700;color:var(--tlg-purple);border-bottom:2px solid var(--line);padding-bottom:6px}
  .item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .item input[type=checkbox]{width:20px;height:20px;accent-color:var(--tlg-purple);cursor:pointer}
  .item .label{flex:1}.item .done{text-decoration:line-through;color:var(--muted)}
  .meta{font-size:12px;color:var(--muted);display:flex;gap:14px}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:#f1edff;color:var(--tlg-purple)}
  .loading,.err{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
  <div class="tlg-header"><span class="brand">TLG</span><span class="tag">The Love Group &bull; Client Intake</span></div>
  <div class="wrap">
    <h1>Client Intake Checklist</h1>
    <div class="controls">
      <select id="fStage"><option value="">All Stages</option></select>
      <select id="fStatus"><option value="">All Statuses</option></select>
      <select id="fDone"><option value="">All Items</option><option value="open">Open only</option><option value="done">Completed only</option></select>
      <select id="sort"><option value="stage-asc">Sort: Stage ↑</option><option value="stage-desc">Sort: Stage ↓</option><option value="due-asc">Sort: Due Date ↑</option><option value="due-desc">Sort: Due Date ↓</option><option value="item-asc">Sort: Item A–Z</option><option value="item-desc">Sort: Item Z–A</option></select>
      <input id="search" type="search" placeholder="Search items…" />
    </div>
    <div id="list" class="loading">Loading checklist…</div>
  </div>
<script>
const API="/.netlify/functions/airtable";let RECORDS=[];
const f=(r,k)=>(r.fields&&r.fields[k]!=null)?r.fields[k]:"";
async function load(){try{const res=await fetch(API);const data=await res.json();if(!res.ok)throw new Error(data.error||"load failed");RECORDS=data.records||[];populateFilters();render();}catch(e){const el=document.getElementById("list");el.className="err";el.textContent="Could not load checklist: "+e.message;}}
function populateFilters(){const stages=[...new Set(RECORDS.map(r=>f(r,"Stage")).filter(Boolean))].sort();const statuses=[...new Set(RECORDS.map(r=>f(r,"Status")).filter(Boolean))].sort();const sSel=document.getElementById("fStage"),stSel=document.getElementById("fStatus");stages.forEach(s=>sSel.add(new Option(s,s)));statuses.forEach(s=>stSel.add(new Option(s,s)));}
function currentSort(rows){const v=document.getElementById("sort").value;const[key,dir]=v.split("-");const m=dir==="asc"?1:-1;const get={stage:r=>f(r,"Stage"),due:r=>f(r,"Due Date"),item:r=>f(r,"Checklist Item")}[key];return rows.sort((a,b)=>String(get(a)).localeCompare(String(get(b)))*m);}
function render(){const stage=document.getElementById("fStage").value;const status=document.getElementById("fStatus").value;const doneF=document.getElementById("fDone").value;const q=document.getElementById("search").value.toLowerCase();let rows=RECORDS.filter(r=>{if(stage&&f(r,"Stage")!==stage)return false;if(status&&f(r,"Status")!==status)return false;if(doneF==="done"&&!f(r,"Done"))return false;if(doneF==="open"&&f(r,"Done"))return false;if(q&&!String(f(r,"Checklist Item")).toLowerCase().includes(q))return false;return true;});rows=currentSort(rows);const byStage={};rows.forEach(r=>{const s=f(r,"Stage")||"Other";(byStage[s]=byStage[s]||[]).push(r)});const el=document.getElementById("list");el.className="";el.innerHTML="";if(!rows.length){el.className="loading";el.textContent="No items match.";return;}Object.keys(byStage).forEach(s=>{const h=document.createElement("div");h.className="stage";h.textContent=s;el.appendChild(h);byStage[s].forEach(r=>el.appendChild(itemRow(r)));});}
function itemRow(r){const row=document.createElement("div");row.className="item";const cb=document.createElement("input");cb.type="checkbox";cb.checked=!!f(r,"Done");const lab=document.createElement("div");lab.className="label"+(cb.checked?" done":"");lab.textContent=f(r,"Checklist Item");const meta=document.createElement("div");meta.className="meta";const status=f(r,"Status"),due=f(r,"Due Date"),owner=f(r,"Owner");if(status)meta.innerHTML+='<span class="pill">'+status+'</span>';if(due)meta.innerHTML+='<span>Due '+due+'</span>';if(owner)meta.innerHTML+='<span>'+owner+'</span>';cb.addEventListener("change",async()=>{cb.disabled=true;try{const res=await fetch(API,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:r.id,done:cb.checked})});if(!res.ok)throw new Error();r.fields.Done=cb.checked;lab.classList.toggle("done",cb.checked);}catch(e){cb.checked=!cb.checked;alert("Could not save. Try again.");}finally{cb.disabled=false;}});row.append(cb,lab,meta);return row;}
["fStage","fStatus","fDone","sort","search"].forEach(id=>{document.getElementById(id).addEventListener("input",render);});
load();
</script>
</body>
</html>
