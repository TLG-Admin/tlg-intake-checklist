<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>TLG Client Intake Checklist</title><style>:root{--tlg-navy:#0a2540;--tlg-blue:#1d72b8;--tlg-accent:#f5a623;--tlg-bg:#f4f6f9;--tlg-card:#ffffff;--tlg-text:#1a2733;--tlg-muted:#5b6b7b;--tlg-done:#2e9e5b;--tlg-border:#e2e8f0}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--tlg-bg);color:var(--tlg-text);line-height:1.5;padding:24px}.wrap{max-width:1200px;margin:0 auto}header.tlg{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px}.brand{display:flex;align-items:center;gap:12px}.brand .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--tlg-navy),var(--tlg-blue));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;letter-spacing:.5px}.brand h1{font-size:22px;color:var(--tlg-navy);font-weight:800}.brand p{font-size:13px;color:var(--tlg-muted)}.progress-box{min-width:220px}.progress-box .pct{font-size:13px;color:var(--tlg-muted);margin-bottom:6px;display:flex;justify-content:space-between}.bar{height:10px;background:var(--tlg-border);border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--tlg-blue),var(--tlg-done));transition:width .4s ease}.controls{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}.controls button{border:1px solid var(--tlg-border);background:#fff;color:var(--tlg-navy);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}.controls button:hover{background:var(--tlg-navy);color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}.flip{perspective:1600px;height:360px}.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}.flip.flipped .flip-inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;background:var(--tlg-card);border:1px solid var(--tlg-border);box-shadow:0 4px 18px rgba(10,37,64,.07);padding:22px;display:flex;flex-direction:column;overflow:hidden}.back{transform:rotateY(180deg)}.stage-no{font-size:12px;font-weight:700;color:var(--tlg-accent);letter-spacing:1px;text-transform:uppercase}.stage-title{font-size:18px;font-weight:800;color:var(--tlg-navy);margin:6px 0 12px}.face .meta{margin-top:auto;font-size:12px;color:var(--tlg-muted);display:flex;justify-content:space-between;align-items:center}.mini-bar{height:6px;background:var(--tlg-border);border-radius:99px;overflow:hidden;margin:10px 0}.mini-bar span{display:block;height:100%;background:var(--tlg-done)}.flip-hint{font-size:12px;color:var(--tlg-blue);font-weight:600}.steps{list-style:none;overflow-y:auto;flex:1;margin:8px 0}.steps li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--tlg-border);font-size:14px}.steps li:last-child{border-bottom:none}.steps input{margin-top:3px;width:16px;height:16px;accent-color:var(--tlg-done);cursor:pointer;flex-shrink:0}.steps label{cursor:pointer}.steps li.done label{text-decoration:line-through;color:var(--tlg-muted)}.back-title{font-size:16px;font-weight:800;color:var(--tlg-navy);margin-bottom:6px}.back .meta{margin-top:8px}footer{margin-top:28px;text-align:center;font-size:12px;color:var(--tlg-muted)}@media(max-width:600px){.flip{height:auto;min-height:340px}}</style></head><body><div class="wrap"><header class="tlg"><div class="brand"><div class="logo">TLG</div><div><h1>Client Intake Checklist</h1><p>The Love Group &mdash; AWS Cloud Partner Advisory</p></div></div><div class="progress-box"><div class="pct"><span>Overall progress</span><span id="pctText">0%</span></div><div class="bar"><span id="overallBar"></span></div></div></header><div class="controls"><button onclick="expandAll()">Flip all open</button><button onclick="collapseAll()">Flip all closed</button><button onclick="resetAll()">Reset progress</button></div><div class="grid" id="grid"></div><footer>&copy; The Love Group. Progress is saved locally in your browser.</footer></div><script>var STAGES=[{n:"Stage 1",t:"Initial Contact & Qualification",steps:["Receive inbound inquiry or referral","Log lead in CRM","Send welcome / acknowledgement email","Confirm prospect is a fit for AWS advisory services","Schedule discovery call"]},{n:"Stage 2",t:"Discovery & Needs Assessment",steps:["Conduct discovery call","Document current cloud environment","Identify primary business objectives","Capture pain points and constraints","Determine budget and timeline expectations"]},{n:"Stage 3",t:"Proposal & Scoping",steps:["Draft scope of work","Define deliverables and milestones","Prepare pricing and engagement model","Internal review of proposal","Send proposal to client"]},{n:"Stage 4",t:"Agreement & Onboarding Setup",steps:["Negotiate and finalize terms","Execute MSA / SOW","Collect signed agreement","Set up client in billing system","Create client folder and workspace"]},{n:"Stage 5",t:"Account & Access Provisioning",steps:["Collect AWS account details securely","Configure IAM roles and access","Verify least-privilege permissions","Set up shared communication channels","Confirm access with client"]},{n:"Stage 6",t:"Kickoff & Stakeholder Alignment",steps:["Schedule kickoff meeting","Introduce delivery team","Review goals, scope, and timeline","Confirm points of contact","Establish meeting cadence"]},{n:"Stage 7",t:"Technical Assessment & Baseline",steps:["Run AWS Well-Architected review","Document architecture baseline","Identify security and cost findings","Prioritize remediation items","Share assessment summary"]},{n:"Stage 8",t:"Roadmap & Delivery Planning",steps:["Develop engagement roadmap","Assign owners to workstreams","Set milestone dates","Define success metrics","Obtain client sign-off on plan"]},{n:"Stage 9",t:"Handoff & Ongoing Engagement",steps:["Confirm all intake items complete","Transition to delivery / managed services","Schedule first review checkpoint","Set up reporting cadence","Collect initial client feedback"]}];var KEY='tlg_intake_v1';function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}function save(s){localStorage.setItem(KEY,JSON.stringify(s))}var state=load();function id(si,ci){return si+'-'+ci}function render(){var g=document.getElementById('grid');g.innerHTML='';STAGES.forEach(function(st,si){var total=st.steps.length;var done=st.steps.filter(function(_,ci){return state[id(si,ci)]}).length;var front='<div class="face front"><div class="stage-no">'+st.n+'</div><div class="stage-title">'+st.t+'</div><div class="mini-bar"><span style="width:'+(total?Math.round(done/total*100):0)+'%"></span></div><div class="meta"><span>'+done+' / '+total+' complete</span><span class="flip-hint">Tap to open &rarr;</span></div></div>';var lis=st.steps.map(function(step,ci){var k=id(si,ci);var ck=state[k]?'checked':'';var dc=state[k]?'done':'';return '<li class="'+dc+'"><input type="checkbox" id="cb-'+k+'" '+ck+' onclick="event.stopPropagation()" onchange="toggle('+si+','+ci+')"><label for="cb-'+k+'">'+step+'</label></li>'}).join('');var back='<div class="face back"><div class="back-title">'+st.n+': '+st.t+'</div><ul class="steps">'+lis+'</ul><div class="meta"><span>'+done+' / '+total+'</span><span class="flip-hint">&larr; Tap to close</span></div></div>';var card=document.createElement('div');card.className='flip';card.innerHTML='<div class="flip-inner">'+front+back+'</div>';card.addEventListener('click',function(){card.classList.toggle('flipped')});g.appendChild(card)});updateOverall()}function toggle(si,ci){var k=id(si,ci);state[k]=!state[k];save(state);render()}function updateOverall(){var total=0,done=0;STAGES.forEach(function(st,si){st.steps.forEach(function(_,ci){total++;if(state[id(si,ci)])done++})});var pct=total?Math.round(done/total*100):0;document.getElementById('overallBar').style.width=pct+'%';document.getElementById('pctText').textContent=pct+'%'}function expandAll(){document.querySelectorAll('.flip').forEach(function(c){c.classList.add('flipped')})}function collapseAll(){document.querySelectorAll('.flip').forEach(function(c){c.classList.remove('flipped')})}function resetAll(){if(confirm('Reset all checklist progress?')){state={};save(state);render()}}render();</script></body></html>
